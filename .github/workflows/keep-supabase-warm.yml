# Keeps a free-tier Supabase project from auto-pausing.
#
# Free Supabase projects pause after 7 days of inactivity. This workflow
# pings the REST endpoint every 3 days so the project stays warm.
#
# The anon key + URL are public by design (paired with RLS), so they
# live in this file plainly — no GitHub secrets required.

name: Keep Supabase warm

on:
  schedule:
    # 03:00 UTC every 3 days (well under the 7-day pause threshold)
    - cron: '0 3 */3 * *'
  workflow_dispatch:   # lets you trigger manually from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST
        env:
          SUPABASE_URL: 'https://yrucfiysnmjkjzzbwtbu.supabase.co'
          SUPABASE_KEY: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlydWNmaXlzbm1qa2p6emJ3dGJ1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyNTA5MjIsImV4cCI6MjA5MTgyNjkyMn0.E2gAeEUn0NbOphFXT08jer7Mq8BW9uyp5LdKUAzyOkI'
        run: |
          code=$(curl -s -o /tmp/resp.txt -w "%{http_code}" \
            "${SUPABASE_URL}/rest/v1/categories?select=id&limit=1" \
            -H "apikey: ${SUPABASE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_KEY}")
          echo "HTTP ${code}"
          head -c 200 /tmp/resp.txt
          echo
          # RLS may return 200 with [] or an error — accept both 200 and 401
          # (a 401 also counts as "saw activity" for keep-alive purposes).
          if [ "$code" != "200" ] && [ "$code" != "401" ]; then
            echo "Unexpected response from Supabase"
            exit 1
          fi
